@if (showModal()) {
  @if (selectedCard(); as selected) {
    <app-card-modal-update 
      (closeModal)="showModal.set(false)" 
      (addCard)="handleUpdateCard(selected.id, $event.front, $event.back, $event.notes)">
    </app-card-modal-update>
  } @else {
    <app-card-modal 
      (closeModal)="showModal.set(false)" 
      (addCard)="handleAddCard($event.front, $event.back, $event.notes)">
    </app-card-modal>
  }
}

@if (collection(); as collection) {
  @if (collection.cards.length > 0) {
    @for (card of collection.cards; track card.id) {
      <div class="card">
        <app-card-small [card]="card"></app-card-small>
        <button (click)="onEdit(card)">Edit Card</button>
      </div>
    }
  } @else {
    <p>Noch keine Karten vorhanden!</p>
  }
}
