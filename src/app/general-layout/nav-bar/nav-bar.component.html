<header class="header">
            <nav class="nav">
                <a routerLink="/">
                    <img src="/logo.png" alt='logo' />
                </a>
                <app-category-list></app-category-list>
                <app-search-bar/>
                <div class="links">
                    @if (loginInfo()) {
                         <a routerLink="/collection/create" class="create">
                       <lucide-icon [img]="plusIcon"/>
                        Erstellen
                    </a>
                    } @else {
                        <a routerLink="/sign-in" class="create">
                            <lucide-icon [img]="plusIcon"/>
                            Erstellen
                        </a>
                    }
                   
                    @if (loginInfo()) {
                        <p (click)="signOut()">Sign Out</p>
                    } @else {
                        <a routerLink="/sign-in"><p>Sign In</p></a>
                    }

                    @if (loginInfo(); as loginData) {
                        <a [routerLink]="['/user', loginData.userId]"><p>My Account</p></a>
                    }
                </div>
            </nav>
        </header>
